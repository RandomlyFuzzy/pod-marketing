<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POD Pipeline</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* Header */
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header .container { display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.25rem; font-weight: 700; }
        header h1 span { color: var(--accent); }
        .phase-dots { display: flex; gap: 6px; align-items: center; }
        .phase-dot {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
            background: var(--bg); color: var(--muted);
            border: 1px solid var(--border);
            cursor: pointer; transition: all .2s;
            text-decoration: none;
        }
        .phase-dot.active { background: var(--accent); color: white; border-color: var(--accent); }
        .phase-dot.done { background: var(--green); color: white; border-color: var(--green); }
        .phase-dot:hover { opacity: .8; }

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 1.1rem; margin-bottom: 16px; color: var(--accent); }
        .card h3 { font-size: 1rem; margin-bottom: 8px; color: var(--text); }

        /* Forms */
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
        input, textarea, select {
            width: 100%; padding: 10px 14px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-size: 0.9rem; transition: border .2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,.2);
        }
        textarea { min-height: 100px; resize: vertical; font-family: inherit; }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: 8px;
            font-weight: 600; font-size: 0.875rem;
            border: none; cursor: pointer;
            transition: all .2s; text-decoration: none;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: #475569; }
        .btn-success { background: var(--green); color: white; }
        .btn-success:hover { opacity: .9; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

        /* Phase hero */
        .phase-hero {
            text-align: center; padding: 40px 0 20px;
        }
        .phase-hero .phase-icon { font-size: 2.5rem; margin-bottom: 8px; }
        .phase-hero h2 { font-size: 1.5rem; color: var(--text); }
        .phase-hero p { color: var(--muted); max-width: 600px; margin: 8px auto 0; }

        /* Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

        /* Result */
        .result-box {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px;
            white-space: pre-wrap; font-size: 0.85rem;
            max-height: 500px; overflow-y: auto;
            line-height: 1.5;
        }
        .result-box h1, .result-box h2, .result-box h3 { color: var(--accent); margin-top: 12px; }
        .result-box h1:first-child, .result-box h2:first-child { margin-top: 0; }
        .result-box strong { color: var(--green); }

        /* Badge */
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 600;
        }
        .badge-green { background: rgba(34,197,94,.15); color: var(--green); }
        .badge-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
        .badge-red { background: rgba(239,68,68,.15); color: var(--red); }
        .badge-blue { background: rgba(59,130,246,.15); color: var(--accent); }

        /* Validation verdict */
        .verdict-good { border-left: 4px solid var(--green); padding-left: 12px; }
        .verdict-review { border-left: 4px solid var(--yellow); padding-left: 12px; }
        .verdict-poor { border-left: 4px solid var(--red); padding-left: 12px; }

        /* Timeline */
        .timeline { position: relative; padding-left: 24px; }
        .timeline::before {
            content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
            width: 2px; background: var(--border);
        }
        .timeline-item { position: relative; margin-bottom: 16px; }
        .timeline-item::before {
            content: ''; position: absolute; left: -20px; top: 6px;
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent); border: 2px solid var(--card);
        }
        .timeline-item .time { font-size: 0.75rem; color: var(--muted); }

        /* Loading spinner */
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin .6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Niche cards */
        .niche-card {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px; cursor: pointer;
            transition: all .2s;
        }
        .niche-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .niche-card h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .niche-card p { font-size: 0.8rem; color: var(--muted); }
        .niche-card .badge { margin-top: 8px; }

        .inline-flex { display: inline-flex; align-items: center; gap: 6px; }
        .mt-4 { margin-top: 16px; }
        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }
        .gap-2 { gap: 8px; }
        .flex { display: flex; }
        .flex-wrap { flex-wrap: wrap; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .text-muted { color: var(--muted); }
        .text-sm { font-size: 0.85rem; }
        .hidden { display: none; }

        .progress-bar {
            height: 4px; background: var(--border); border-radius: 2px;
            overflow: hidden; margin: 16px 0;
        }
        .progress-fill {
            height: 100%; background: var(--accent); border-radius: 2px;
            transition: width .5s;
        }
    </style>
</head>
<body>
<header>
    <div class="container">
        <a href="/" style="text-decoration:none;color:var(--text)"><h1>POD <span>Pipeline</span></h1></a>
        <div class="phase-dots">
            <a href="/phase/research" class="phase-dot {% if state.phase == 'research' %}active{% elif state.research_data %}done{% endif %}">
                1. Research
            </a>
            <span class="text-muted" style="font-size:0.7rem">→</span>
            <a href="/phase/validate" class="phase-dot {% if state.phase == 'validate' %}active{% elif state.validation_data %}done{% endif %}">
                2. Validate
            </a>
            <span class="text-muted" style="font-size:0.7rem">→</span>
            <a href="/phase/create" class="phase-dot {% if state.phase == 'create' %}active{% elif state.listing_content %}done{% endif %}">
                3. Create
            </a>
            <span class="text-muted" style="font-size:0.7rem">→</span>
            <a href="/phase/publish" class="phase-dot {% if state.phase == 'publish' %}active{% elif state.publish_data %}done{% endif %}">
                4. Publish
            </a>
        </div>
    </div>
</header>

<main class="container">
    {% block content %}{% endblock %}
</main>

<script>
async function apiPost(url, data) {
    const resp = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
    });
    return resp.json();
}

function showLoading(id) {
    const el = document.getElementById(id);
    if (el) el.classList.remove('hidden');
}
function hideLoading(id) {
    const el = document.getElementById(id);
    if (el) el.classList.add('hidden');
}
function showResult(id, html) {
    const el = document.getElementById(id);
    if (el) { el.innerHTML = html; el.classList.remove('hidden'); }
}
</script>
</body>
</html>
